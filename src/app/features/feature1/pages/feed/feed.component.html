
<div *ngIf="posts.length > 0; else noPosts">
  <app-post *ngFor="let post of posts" [post]="post"></app-post>
=======
<div *ngIf="postService.posts.length > 0; else noPosts">
  <ng-container *ngFor="let post of postService.posts" >
    <app-post [post]="post"></app-post>
  </ng-container>
</div>


<ng-template #noPosts>
  <p>Нет постов.</p>
</ng-template>
