<p>Моя мини-соцсеть</p>
<app-profile/>
<app-post/>
<app-card/>

  <div>
    <h2>Активный пользователь: {{ (userService.activeUser$ | async)?.name }}</h2>
    <button (click)="switchUser()">Сменить пользователя</button>
  </div>

  <h2>Список постов</h2>
<ul>
  <li *ngFor="let post of posts">
    <h3>{{ post.title }}</h3>
    <p>{{ post.content }}</p>
    <p>❤️ Лайки: {{ post.likes }}</p>

    <button (click)="likePost(post.id)">👍 Лайк</button>

    <button (click)="toggleComments(post.id)">
      {{ post.showComments ? 'Скрыть комментарии' : 'Показать комментарии' }}
    </button>

    <div *ngIf="post.showComments">
      <p>{{post.comments}}</p>
    </div>
  </li>
</ul>
